app = "floral-anomaly-detector"
primary_region = "yyz"

[build]

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 0

[mounts]
  source = "esa_tiles"
  destination = "/data"

[[vm]]
memory = "1gb"
cpu_kind = "shared"
cpus = 1
